backend:
  name: github
  repo: Dominuzzz/pandemoniumart
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "homepage"
    label: "Home Page Settings"
    editor:
      preview: false
    files:
      - file: "content/home.json"
        label: "Hero Slideshow Images"
        name: "home_settings"
        fields:
          - {label: "Slideshow Images", name: "slides", widget: "list", field: {label: "Image", name: "image", widget: "image"}}

  - name: "aboutpage"
    label: "About Page Settings"
    editor:
      preview: false
    files:
      - file: "content/about.json"
        label: "About Page Content"
        name: "about_settings"
        fields:
          - {label: "Profile Square Image", name: "profile_image", widget: "image"}
          - {label: "Bio Text", name: "bio", widget: "text"}
          - {label: "Experience", name: "experience", widget: "list", fields: [{label: "Year", name: "year", widget: "string"}, {label: "Role & Company", name: "title", widget: "string"}]}
          - {label: "Freelance Clients", name: "clients", widget: "list", field: {label: "Client Name", name: "name", widget: "string"}}
          - {label: "Publications", name: "publications", widget: "list", fields: [{label: "Year", name: "year", widget: "string"}, {label: "Title", name: "title", widget: "string"}]}
          - {label: "Education", name: "education", widget: "list", fields: [{label: "Year", name: "year", widget: "string"}, {label: "Degree & School", name: "degree", widget: "string"}]}
          - {label: "Bottom Long Image", name: "bottom_image", widget: "image"}
