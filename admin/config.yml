backend:
  name: github
  repo: Dominuzzz/pandemoniumart
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "settings"
    label: "Global Settings"
    delete: false
    editor:
      preview: false
    files:
      - file: "content/settings.json"
        label: "Navigation & Socials"
        name: "nav_settings"
        fields:
          - {label: "Menu: About Label", name: "label_about", widget: "string", default: "About"}
          - {label: "Menu: Personal Label", name: "label_personal", widget: "string", default: "Personal"}
          - {label: "Menu: Games Label", name: "label_games", widget: "string", default: "Games"}
          - {label: "Menu: Shop Label", name: "label_shop", widget: "string", default: "Shop"}
          - {label: "Shop URL", name: "shop_url", widget: "string"}
          - {label: "Games Dropdown Order", name: "nav_games", widget: "list", fields: [{label: "Link Label", name: "label", widget: "string"}, {label: "Project Slug (Filename)", name: "slug", widget: "string"}]}
          - {label: "Personal Dropdown Order", name: "nav_personal", widget: "list", fields: [{label: "Link Label", name: "label", widget: "string"}, {label: "Project Slug (Filename)", name: "slug", widget: "string"}]}
          - {label: "Footer Social Links", name: "socials", widget: "list", fields: [{label: "Platform", name: "platform", widget: "string"}, {label: "URL", name: "url", widget: "string"}]}

  - name: "homepage"
    label: "Home Page Settings"
    files:
      - file: "content/home.json"
        label: "Hero Slideshow"
        name: "home_settings"
        fields:
          - {label: "Slideshow Images", name: "slides", widget: "list", field: {label: "Image", name: "image", widget: "image"}}

  - name: "aboutpage"
    label: "About Page Settings"
    files:
      - file: "content/about.json"
        label: "About Page"
        name: "about_settings"
        fields:
          - {label: "Profile Image", name: "profile_image", widget: "image"}
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Name Font Size", name: "name_size", widget: "select", options: ["24px", "30px", "36px", "48px", "60px"], default: "30px"}
          - {label: "Bio Text", name: "bio", widget: "text"}
          - {label: "Resume PDF", name: "resume_pdf", widget: "file", required: false}
          - {label: "Section Titles", name: "titles", widget: "object", fields: [{label: "Experience", name: "exp", widget: "string"}, {label: "Clients", name: "cli", widget: "string"}, {label: "Publications", name: "pub", widget: "string"}, {label: "Education", name: "edu", widget: "string"}]}
          - {label: "Experience List", name: "experience", widget: "list", fields: [{label: "Company", name: "company", widget: "string"}, {label: "Role", name: "title", widget: "string"}, {label: "Projects", name: "projects", widget: "string", required: false}]}

  - name: "games"
    label: "Games Projects"
    folder: "content/games"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Description", name: "body", widget: "markdown"}
      - {label: "Text Font Size", name: "font_size", widget: "number", default: 18}
      - {label: "Gallery Images", name: "gallery", widget: "list", field: {label: "Image", name: "image", widget: "image"}}

  - name: "personal"
    label: "Personal Projects"
    folder: "content/personal"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Description", name: "body", widget: "markdown"}
      - {label: "Text Font Size", name: "font_size", widget: "number", default: 18}
      - {label: "Gallery Images", name: "gallery", widget: "list", field: {label: "Image", name: "image", widget: "image"}}
