backend:
  name: github
  repo: Dominuzzz/pandemoniumart
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "homepage"
    label: "Home Page Settings"
    editor:
      preview: false
    files:
      - file: "content/home.json"
        label: "Hero Slideshow Images"
        name: "home_settings"
        fields:
          - {label: "Slideshow Images", name: "slides", widget: "list", field: {label: "Image", name: "image", widget: "image"}}

  - name: "aboutpage"
    label: "About Page Settings"
    editor:
      preview: false
    files:
      - file: "content/about.json"
        label: "About Page Content"
        name: "about_settings"
        fields:
          - {label: "Profile Square Image", name: "profile_image", widget: "image"}
          - {label: "Bio Text", name: "bio", widget: "text"}
          - {label: "Resume PDF", name: "resume_pdf", widget: "file"}
          - {label: "Social Links", name: "socials", widget: "list", fields: [{label: "Platform Name", name: "platform", widget: "string"}, {label: "URL", name: "url", widget: "string"}]}
          - {label: "Experience", name: "experience", widget: "list", fields: [{label: "Company", name: "company", widget: "string"}, {label: "Role & Year", name: "title", widget: "string"}]}
          - {label: "Freelance Clients", name: "clients", widget: "list", field: {label: "Client Name", name: "name", widget: "string"}}
          - {label: "Publications", name: "publications", widget: "list", fields: [{label: "Company / Publisher", name: "company", widget: "string"}, {label: "Title & Year", name: "title", widget: "string"}]}
          - {label: "Education", name: "education", widget: "list", fields: [{label: "School / Company", name: "company", widget: "string"}, {label: "Degree & Year", name: "title", widget: "string"}]}
          - {label: "Bottom Long Image", name: "bottom_image", widget: "image"}
          - {label: "Bottom Image Width", name: "bottom_image_width", widget: "select", options: ["100%", "75%", "50%", "25%"], default: "100%"}
          - {label: "Bottom Image Alignment", name: "bottom_image_align", widget: "select", options: ["left", "center", "right"], default: "center"}
