backend:
  name: github
  repo: Dominuzzz/pandemoniumart
  branch: main
  auth_type: pkce
  app_id: Ov23li8zvtXnRyYfy41R

# This tells the dashboard where to put new images you upload
media_folder: "images"
public_folder: "images"

collections:
  - name: "homepage"
    label: "Home Page Settings"
    editor:
      preview: false
    files:
      - file: "content/home.json"
        label: "Hero Slideshow Images"
        name: "home_settings"
        fields:
          - {label: "Slideshow Images", name: "slides", widget: "list", field: {label: "Image", name: "image", widget: "image"}}
