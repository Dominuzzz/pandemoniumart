backend:
  name: github
  repo: Dominuzzz/pandemoniumart
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "settings"
    label: "Global Settings"
    delete: false
    editor:
      preview: false
    files:
      - file: "content/settings.json"
        label: "Navigation Menu"
        name: "nav_settings"
        fields:
          - name: "label_about"
            label: "Menu: About Label"
            widget: "string"
            default: "About"
          - name: "label_portfolio"
            label: "Menu: Portfolio Label"
            widget: "string"
            default: "Portfolio"
          - name: "label_shop"
            label: "Menu: Shop Label"
            widget: "string"
            default: "Shop"
          - name: "shop_url"
            label: "Shop URL"
            widget: "string"
          - name: "portfolio_order"
            label: "Portfolio Manual Order"
            widget: "list"
            summary: "{{label}}"
            fields:
              - name: "label"
                label: "Project Display Name"
                widget: "string"
              - name: "slug"
                label: "Select Project"
                widget: "relation"
                collection: "projects"
                search_fields: ["title"]
                value_field: "{{slug}}"
                display_fields: ["title"]

  - name: "portfoliopage"
    label: "Portfolio Page Settings"
    editor:
      preview: false
    files:
      - file: "content/portfolio_page.json"
        label: "Portfolio Page Intro"
        name: "portfolio_settings"
        fields:
          - name: "intro_text"
            label: "Page Title / Intro Text"
            widget: "markdown"

  - name: "aboutpage"
    label: "About Page Settings"
    editor:
      preview: false
    files:
      - file: "content/about.json"
        label: "About Page"
        name: "about_settings"
        fields:
          - name: "profile_image"
            label: "Profile Image"
            widget: "image"
          - name: "name"
            label: "Your Name"
            widget: "string"
          - name: "name_size"
            label: "Name Font Size"
            widget: "select"
            options: ["24px", "30px", "36px", "48px", "60px"]
            default: "30px"
          - name: "bio"
            label: "Bio Text"
            widget: "text"
          - name: "resume_pdf"
            label: "Resume PDF"
            widget: "file"
            required: false
          - name: "socials"
            label: "Social Links"
            widget: "list"
            fields:
              - name: "platform"
                label: "Platform"
                widget: "string"
              - name: "url"
                label: "URL"
                widget: "string"
          - name: "title_experience"
            label: "Section Title: Experience"
            widget: "string"
          - name: "experience"
            label: "Experience List"
            widget: "list"
            fields:
              - name: "company"
                label: "Company"
                widget: "string"
              - name: "title"
                label: "Role"
                widget: "string"
              - name: "projects"
                label: "Projects"
                widget: "string"
                required: false
          - name: "title_clients"
            label: "Section Title: Clients"
            widget: "string"
          - name: "clients"
            label: "Freelance Clients"
            widget: "list"
            field:
              name: "name"
              label: "Client Name"
              widget: "string"
          - name: "title_publications"
            label: "Section Title: Publications"
            widget: "string"
          - name: "publications"
            label: "Publications"
            widget: "list"
            fields:
              - name: "company"
                label: "Publisher"
                widget: "string"
              - name: "title"
                label: "Title"
                widget: "string"
          - name: "title_education"
            label: "Section Title: Education"
            widget: "string"
          - name: "education"
            label: "Education"
            widget: "list"
            fields:
              - name: "company"
                label: "School"
                widget: "string"
              - name: "title"
                label: "Degree"
                widget: "string"
          - name: "bottom_image"
            label: "Bottom Long Image"
            widget: "image"
          - name: "bottom_image_width"
            label: "Bottom Image Width"
            widget: "select"
            options: ["100%", "75%", "50%", "25%"]
            default: "100%"
          - name: "bottom_image_align"
            label: "Bottom Image Alignment"
            widget: "select"
            options: ["left", "center", "right"]
            default: "center"

  - name: "homepage"
    label: "Home Page Settings"
    editor:
      preview: false
    files:
      - file: "content/home.json"
        label: "Hero Slideshow"
        name: "home_settings"
        fields:
          - name: "slides"
            label: "Slideshow Images"
            widget: "list"
            field:
              name: "image"
              label: "Image"
              widget: "image"

  - name: "projects"
    label: "Projects (Portfolio)"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - name: "title"
        label: "Project Title"
        widget: "string"
      - name: "company"
        label: "Company / Client (Optional)"
        widget: "string"
        required: false
      - name: "thumbnail"
        label: "Grid Thumbnail Image"
        widget: "image"
      - name: "body"
        label: "Project Description"
        widget: "markdown"
        required: false
      - name: "font_size"
        label: "Description Font Size"
        widget: "number"
        default: 18
      - name: "gallery"
        label: "Gallery Images"
        widget: "list"
        field:
          name: "image"
          label: "Image"
          widget: "image"
