<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandemonium Art | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #050505; color: #e5e5e5; overflow: hidden; }
        .nav-link { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; transition: color 0.3s; text-shadow: 0px 2px 4px rgba(0,0,0,1); cursor: pointer; }
        .nav-link:hover { color: #fff; }
        .slide { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 2s ease-in-out; z-index: -1; }
        .slide.active { opacity: 1; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.7) 100%); z-index: 0; pointer-events: none; }
    </style>
</head>
<body class="h-screen w-full relative">

    <div id="slideshow-container"></div>
    <div class="overlay"></div>

    <nav class="absolute top-0 w-full flex justify-between items-start px-12 py-12 z-50">
        <a href="home.html" class="text-3xl font-black uppercase italic tracking-tighter" style="text-shadow: 0px 4px 15px rgba(0,0,0,1);">Pandemonium Art</a>
        
        <div class="flex gap-10 mt-2">
            <a href="about.html" id="link-about" class="nav-link text-gray-400">About</a>
            <a href="portfolio.html" id="link-portfolio" class="nav-link text-gray-400">Portfolio</a>
            <a href="#" id="link-shop" target="_blank" class="nav-link text-gray-400">Shop</a>
        </div>
    </nav>

    <footer class="absolute bottom-0 w-full flex justify-between items-end px-12 py-12 z-10 pointer-events-none">
        <div class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-600 pointer-events-auto">&copy; 2026 Pandemonium Art</div>
        <div id="footer-socials" class="flex gap-8 pointer-events-auto"></div>
    </footer>

    <script>
        const formatImg = (url) => {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            return '/' + url.replace(/^\/+/, ''); 
        };

        async function initPage() {
            const cacheBust = '?v=' + Date.now();

            // 1. LOAD SLIDESHOW
            try {
                const homeRes = await fetch('content/home.json' + cacheBust);
                const homeData = await homeRes.json();
                const container = document.getElementById('slideshow-container');
                
                if (homeData.slides && homeData.slides.length > 0) {
                    let slideUrls = [...homeData.slides];
                    if (slideUrls.length > 2) {
                        const firstImage = slideUrls.shift();
                        for (let i = slideUrls.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [slideUrls[i], slideUrls[j]] = [slideUrls[j], slideUrls[i]];
                        }
                        slideUrls.unshift(firstImage);
                    }

                    slideUrls.forEach((imgUrl, index) => {
                        const img = document.createElement('img');
                        img.src = formatImg(imgUrl);
                        img.className = index === 0 ? 'slide active' : 'slide';
                        container.appendChild(img);
                    });

                    const slides = document.querySelectorAll('.slide');
                    if (slides.length > 1) {
                        let currentSlide = 0;
                        setInterval(() => {
                            slides[currentSlide].classList.remove('active');
                            currentSlide = (currentSlide + 1) % slides.length;
                            slides[currentSlide].classList.add('active');
                        }, 5000);
                    }
                }
            } catch (e) { console.warn("Slideshow failed to load:", e); }

            // 2. LOAD NAV SETTINGS
            try {
                const settingsRes = await fetch('content/settings.json' + cacheBust);
                const settings = await settingsRes.json();
                document.getElementById('link-about').innerText = settings.label_about || "About";
                document.getElementById('link-portfolio').innerText = settings.label_portfolio || "Portfolio";
                document.getElementById('link-shop').innerText = settings.label_shop || "Shop";
                document.getElementById('link-shop').href = settings.shop_url || "#";
            } catch (e) { console.warn("Nav failed:", e); }

            // 3. LOAD FOOTER SOCIALS FROM ABOUT.JSON
            try {
                const aboutRes = await fetch('content/about.json' + cacheBust);
                const aboutData = await aboutRes.json();
                const footSocials = document.getElementById('footer-socials');
                if (aboutData.socials) {
                    aboutData.socials.forEach(s => {
                        footSocials.innerHTML += `<a href="${s.url}" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors" style="text-shadow: 0px 2px 5px rgba(0,0,0,0.8);">${s.platform}</a>`;
                    });
                }
            } catch (e) { console.warn("Socials failed:", e); }
        }

        document.addEventListener("DOMContentLoaded", initPage);
    </script>
</body>
</html>
