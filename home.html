<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandemonium Art | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #050505; 
            color: #e5e5e5; 
            overflow: hidden; /* Prevents scrolling on the hero page */
        }
        
        /* Navigation Links */
        .nav-link { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            transition: color 0.3s; 
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8); 
            cursor: pointer;
        }
        .nav-link:hover { color: #fff; }
        
        /* Dropdown Setup */
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: -10px; 
            background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(10px); 
            min-width: 160px; 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 10px 0; 
        }
        .dropdown:hover .dropdown-menu { display: block; }
        .dropdown-item { 
            display: block; 
            padding: 10px 20px; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: #888; 
            transition: 0.3s; 
        }
        .dropdown-item:hover { color: #fff; background: rgba(255,255,255,0.05); }

        /* Slideshow Setup */
        .slide { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
            z-index: -1; 
        }
        .slide.active { opacity: 1; }
        
        /* Dark Gradient Overlay (Ensures text is always readable over bright art) */
        .overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 15%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.8) 100%); 
            z-index: 0; 
            pointer-events: none; 
        }
    </style>
</head>
<body class="h-screen w-full relative">

    <div id="slideshow-container">
        <img src="https://via.placeholder.com/1920x1080/050505/333333?text=Hero+Image+01" class="slide active" alt="Hero 1">
        <img src="https://via.placeholder.com/1920x1080/111111/444444?text=Hero+Image+02" class="slide" alt="Hero 2">
        <img src="https://via.placeholder.com/1920x1080/0a0a0a/222222?text=Hero+Image+03" class="slide" alt="Hero 3">
    </div>
    
    <div class="overlay"></div>

    <nav class="absolute top-0 w-full flex justify-between items-start px-12 py-12 z-10">
        <a href="home.html" class="text-3xl font-black uppercase italic tracking-tighter" style="text-shadow: 0px 4px 15px rgba(0,0,0,1);">
            Pandemonium Art
        </a>
        
        <div class="flex gap-10 mt-2">
            <a href="about.html" class="nav-link text-gray-400">About</a>
            
            <div class="dropdown relative">
                <span class="nav-link text-gray-400 pb-4 block">Personal</span>
                <div class="dropdown-menu">
                    <a href="#" class="dropdown-item">Project Alpha</a>
                    <a href="#" class="dropdown-item">Sketches</a>
                </div>
            </div>

            <div class="dropdown relative">
                <span class="nav-link text-gray-400 pb-4 block">Games</span>
                <div class="dropdown-menu">
                    <a href="games.html" class="dropdown-item">Gloomwood</a>
                    <a href="games.html" class="dropdown-item">Thief</a>
                    <a href="games.html" class="dropdown-item">Demeo</a>
                </div>
            </div>

            <a href="https://your-shop-link.com" target="_blank" class="nav-link text-gray-400">Shop</a>
        </div>
    </nav>

    <footer class="absolute bottom-0 w-full flex justify-between items-end px-12 py-12 z-10 pointer-events-none">
        <div class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-600 pointer-events-auto">
            &copy; 2026 Pandemonium Art
        </div>
        
        <div class="flex gap-8 pointer-events-auto">
            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors" style="text-shadow: 0px 2px 5px rgba(0,0,0,0.8);">Instagram</a>
            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors" style="text-shadow: 0px 2px 5px rgba(0,0,0,0.8);">BlueSky</a>
            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors" style="text-shadow: 0px 2px 5px rgba(0,0,0,0.8);">LinkedIn</a>
            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors" style="text-shadow: 0px 2px 5px rgba(0,0,0,0.8);">ArtStation</a>
        </div>
    </footer>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Crossfade every 5 seconds
        setInterval(nextSlide, 5000);
    </script>
</body>
</html>
