<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazine Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #3f3f3f; color: #fff; }
        .back-btn { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); font-weight: 700; margin-bottom: 2rem; display: inline-block; }
        .back-btn:hover { color: #fff; }
        
        .year-title { font-size: 36px; font-weight: 900; margin: 4rem 0 2rem 0; font-style: italic; }
        .issue-slot { display: flex; flex-direction: column; }
        .cover-box { width: 100%; aspect-ratio: 3/4; background: #fff; margin-bottom: 0.5rem; object-fit: cover; }
        .cover-empty { width: 100%; aspect-ratio: 3/4; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); margin-bottom: 0.5rem; }
        
        .issue-label { font-size: 13px; font-weight: 900; padding: 4px 6px; display: inline-block; }
        .status-collected { background-color: #65a30d; color: white; }
        .status-missing { color: white; }
        
        .md-notes { font-size: 12px; color: #cbd5e1; margin-top: 0.5rem; line-height: 1.4; }
        .md-notes a { color: #a3e635; text-decoration: underline; }
        .global-notes { font-size: 16px; color: #e2e8f0; max-w-3xl; line-height: 1.6; margin-bottom: 2rem;}
    </style>
</head>
<body class="p-8 md:p-16">

    <div class="max-w-screen-2xl mx-auto">
        <a href="index.html" class="back-btn">&larr; Back to Archive</a>
        
        <h1 id="mag-title" class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-6"></h1>
        <div id="mag-notes" class="global-notes"></div>
        
        <div id="years-container"></div>
    </div>

    <script>
        const formatImg = (url) => { if (!url) return ''; if (url.startsWith('http')) return url; return '/../' + url.replace(/^\/+/, ''); };
        const parseMD = (str) => str ? marked.parse(str) : '';

        async function loadMagazine() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) { document.getElementById('mag-title').innerText = "Not Found"; return; }

            const cacheBust = '?v=' + Date.now();
            try {
                const res = await fetch(`../content/magazines/${id}.json` + cacheBust);
                const data = await res.json();

                document.title = data.title + " | Archive";
                document.getElementById('mag-title').innerText = data.title;
                document.getElementById('mag-notes').innerHTML = parseMD(data.notes);

                const container = document.getElementById('years-container');
                if (data.years) {
                    data.years.forEach(yearData => {
                        let yearHtml = `<h2 class="year-title">${yearData.year}</h2>`;
                        yearHtml += `<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-x-6 gap-y-10">`;

                        const issues = yearData.issues || [];
                        // Pad the array to guarantee at least 12 slots visually
                        const totalSlots = Math.max(12, issues.length);

                        for (let i = 0; i < totalSlots; i++) {
                            const issue = issues[i];
                            
                            if (issue) {
                                // Real Issue added in Dashboard
                                const coverHtml = issue.cover 
                                    ? `<img src="${formatImg(issue.cover)}" class="cover-box" loading="lazy">` 
                                    : `<div class="cover-empty"></div>`;
                                
                                const labelClass = issue.collected ? "status-collected" : "status-missing";
                                const labelHtml = issue.issue_label ? `<div class="issue-label ${labelClass}">${issue.issue_label}</div>` : '';
                                const notesHtml = issue.notes ? `<div class="md-notes">${parseMD(issue.notes)}</div>` : '';

                                yearHtml += `
                                    <div class="issue-slot">
                                        ${coverHtml}
                                        <div>${labelHtml}</div>
                                        ${notesHtml}
                                    </div>`;
                            } else {
                                // Blank Slot for permanent grid structure
                                yearHtml += `<div class="issue-slot"><div class="cover-empty"></div></div>`;
                            }
                        }
                        
                        yearHtml += `</div>`;
                        container.innerHTML += yearHtml;
                    });
                }
            } catch (e) { console.error("Error", e); }
        }
        document.addEventListener("DOMContentLoaded", loadMagazine);
    </script>
</body>
</html>
