<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandemonium Art | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #050505; color: #e5e5e5; }
        .nav-link { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { color: #fff; }
        
        .project-card { transition: transform 0.5s ease; cursor: pointer; }
        .project-card:hover .project-thumb { filter: brightness(1.1); transform: scale(1.02); }
        
        /* 3/4 Portrait Aspect Ratio */
        .project-thumb { width: 100%; aspect-ratio: 3/4; object-fit: cover; filter: brightness(0.85); transition: all 0.5s ease; }
        
        /* White Title, Grey Company */
        .project-title { margin-top: 1.25rem; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; transition: color 0.3s; }
        .project-company { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-top: 0.25rem; }
        
        #portfolio-intro h1 { font-size: 48px; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 1rem;}
        #portfolio-intro p { color: #888; font-size: 18px; }
    </style>
</head>
<body class="w-full relative">

    <nav class="fixed top-0 w-full flex justify-between items-start px-12 py-10 z-50 bg-[#050505]/90 backdrop-blur-md border-b border-white/5">
        <a href="home.html" class="text-3xl font-black uppercase italic tracking-tighter">Pandemonium Art</a>
        <div class="flex gap-10 mt-2">
            <a href="about.html" id="link-about" class="nav-link text-gray-400">About</a>
            <a href="portfolio.html" id="link-portfolio" class="nav-link text-white">Portfolio</a>
            <a href="#" id="link-shop" target="_blank" class="nav-link text-gray-400">Shop</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-12 pt-40 pb-32">
        <div id="portfolio-intro" class="mb-20"></div>
        <div id="portfolio-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-16"></div>
    </main>

    <footer class="w-full flex justify-between items-end px-12 py-12 border-t border-white/5">
        <div class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-600">&copy; 2026 Pandemonium Art</div>
        <div id="footer-socials" class="flex gap-8"></div>
    </footer>

    <script>
        const formatImg = (url) => {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            return '/' + url.replace(/^\/+/, ''); 
        };

        async function initPortfolio() {
            const cacheBust = '?v=' + Date.now();
            try {
                // 1. Intro Text
                const introRes = await fetch('content/portfolio_page.json' + cacheBust);
                const introData = await introRes.json();
                if (introData.intro_text) {
                    document.getElementById('portfolio-intro').innerHTML = introData.intro_text;
                }

                // 2. Load Nav & Socials
                const settingsRes = await fetch('content/settings.json' + cacheBust);
                const settings = await settingsRes.json();
                document.getElementById('link-about').innerText = settings.label_about || "About";
                document.getElementById('link-portfolio').innerText = settings.label_portfolio || "Portfolio";
                document.getElementById('link-shop').innerText = settings.label_shop || "Shop";
                document.getElementById('link-shop').href = settings.shop_url || "#";

                const aboutRes = await fetch('content/about.json' + cacheBust);
                const aboutData = await aboutRes.json();
                const footSocials = document.getElementById('footer-socials');
                if (aboutData.socials) {
                    aboutData.socials.forEach(s => {
                        footSocials.innerHTML += `<a href="${s.url}" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors">${s.platform}</a>`;
                    });
                }

                // 3. Load Grid
                const grid = document.getElementById('portfolio-grid');
                if (settings.portfolio_order) {
                    for (const proj of settings.portfolio_order) {
                        const slug = proj.slug.toLowerCase();
                        try {
                            const projRes = await fetch(`content/projects/${slug}.json` + cacheBust);
                            const projData = await projRes.json();
                            let companyHtml = projData.company ? `<div class="project-company">${projData.company}</div>` : '';
                            grid.innerHTML += `
                                <a href="project.html?id=${slug}" class="project-card block">
                                    <div class="overflow-hidden bg-[#111]">
                                        <img src="${formatImg(projData.thumbnail)}" alt="${projData.title}" class="project-thumb">
                                    </div>
                                    <h3 class="project-title">${projData.title}</h3>
                                    ${companyHtml}
                                </a>`;
                        } catch (err) { console.warn(`Could not load project: ${slug}`); }
                    }
                }
            } catch (e) { console.error("Layout failed:", e); }
        }
        document.addEventListener("DOMContentLoaded", initPortfolio);
    </script>
</body>
</html>
