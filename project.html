<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Project</title>
    
    <meta property="og:title" content="Pandemonium Art | Project">
    <meta property="og:description" content="Art Direction, Visual Development, and Concept Art.">
    <meta property="og:image" content="https://www.pandemoniumart.net/images/social-share.jpg">
    <meta property="og:url" content="https://www.pandemoniumart.net">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #050505; color: #e5e5e5; }
        .nav-link { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { color: #fff; }
        
        .gallery-img { width: 100%; height: auto; margin-bottom: 2rem; cursor: zoom-in; filter: brightness(90%); transition: 0.5s ease; }
        .gallery-img:hover { filter: brightness(100%); }

        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; justify-content: center; align-items: center; }
        #lightbox-img { max-width: 95%; max-height: 90vh; object-fit: contain; user-select: none; }
        .lightbox-btn { position: absolute; top: 50%; transform: translateY(-50%); font-size: 50px; color: white; opacity: 0.2; transition: 0.3s; cursor: pointer; padding: 20px; md:padding: 40px; user-select: none; }
        .lightbox-btn:hover { opacity: 1; }
        
        #proj-body a { color: #fff; text-decoration: underline; text-underline-offset: 4px; }
        #proj-body p { margin-bottom: 1.5rem; }
    </style>
</head>
<body class="w-full relative">

    <nav class="fixed top-0 w-full flex flex-col sm:flex-row justify-between items-center sm:items-start px-6 md:px-12 py-6 md:py-10 z-50 bg-[#050505]/90 backdrop-blur-md border-b border-white/5">
        <a href="index.html" class="text-2xl md:text-3xl font-black uppercase tracking-tighter text-white">Pandemonium Art</a>
        <div class="flex gap-6 md:gap-10 mt-4 sm:mt-2">
            <a href="about.html" id="link-about" class="nav-link text-gray-400">About</a>
            <a href="portfolio.html" id="link-portfolio" class="nav-link text-white">Portfolio</a>
            <a href="#" id="link-shop" target="_blank" class="nav-link text-gray-400">Shop</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 pt-32 md:pt-40 pb-20 md:pb-32">
        <div class="max-w-3xl mb-16 md:mb-24">
            <h1 id="proj-title" class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-6 md:mb-8 leading-none"></h1>
            <div id="proj-body" class="text-gray-400 leading-relaxed font-medium"></div>
        </div>

        <div id="proj-gallery" class="flex flex-col"></div>
    </main>

    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-btn left-0" onclick="prevImg(event)">&lsaquo;</span>
        <img id="lightbox-img" src="" alt="Gallery Image">
        <span class="lightbox-btn right-0" onclick="nextImg(event)">&rsaquo;</span>
    </div>

    <footer class="w-full flex flex-col sm:flex-row justify-between items-center sm:items-end px-6 md:px-12 py-8 md:py-12 border-t border-white/5 gap-4 sm:gap-0">
        <div class="text-[9px] font-bold uppercase tracking-[0.2em] text-gray-600">&copy; 2026 Pandemonium Art</div>
        <div id="footer-socials" class="flex gap-6 md:gap-8"></div>
    </footer>

    <script>
        let currentImages = [];
        let currentIndex = 0;

        const formatImg = (url) => { if (!url) return ''; if (url.startsWith('http')) return url; return '/' + url.replace(/^\/+/, ''); };

        async function initProject() {
            const cacheBust = '?v=' + Date.now();

            try {
                const settingsRes = await fetch('content/settings.json' + cacheBust);
                const settings = await settingsRes.json();
                document.getElementById('link-about').innerText = settings.label_about || "About";
                document.getElementById('link-portfolio').innerText = settings.label_portfolio || "Portfolio";
                document.getElementById('link-shop').innerText = settings.label_shop || "Shop";
                document.getElementById('link-shop').href = settings.shop_url || "#";

                const aboutRes = await fetch('content/about.json' + cacheBust);
                const aboutData = await aboutRes.json();
                const footSocials = document.getElementById('footer-socials');
                if (aboutData.socials) {
                    aboutData.socials.forEach(s => {
                        footSocials.innerHTML += `<a href="${s.url}" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors">${s.platform}</a>`;
                    });
                }
            } catch (e) { console.warn("Layout failed:", e); }

            try {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');

                if(!id) { window.location.href = 'portfolio.html'; return; }

                const projRes = await fetch(`content/projects/${id}.json` + cacheBust);
                const data = await projRes.json();

                document.title = `${data.title} | Pandemonium Art`;
                document.getElementById('proj-title').innerText = data.title;
                
                const bodyEl = document.getElementById('proj-body');
                bodyEl.innerHTML = data.body || ""; 
                bodyEl.style.fontSize = (data.font_size || 18) + 'px';

                const galleryContainer = document.getElementById('proj-gallery');
                currentImages = data.gallery || [];

                currentImages.forEach((imgUrl, idx) => {
                    const img = document.createElement('img');
                    img.src = formatImg(imgUrl);
                    img.className = "gallery-img";
                    img.onclick = () => openLightbox(idx);
                    galleryContainer.appendChild(img);
                });

            } catch (e) { console.error("Error loading project:", e); document.getElementById('proj-title').innerText = "Project Not Found"; }
        }

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox-img').src = formatImg(currentImages[currentIndex]);
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox(e) {
            if (e.target.id === "lightbox" || e.target.id === "lightbox-img") {
                document.getElementById('lightbox').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
        function nextImg(e) { e.stopPropagation(); currentIndex = (currentIndex + 1) % currentImages.length; document.getElementById('lightbox-img').src = formatImg(currentImages[currentIndex]); }
        function prevImg(e) { e.stopPropagation(); currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; document.getElementById('lightbox-img').src = formatImg(currentImages[currentIndex]); }

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === "ArrowRight") nextImg(e);
                if (e.key === "ArrowLeft") prevImg(e);
                if (e.key === "Escape") closeLightbox({target: {id: 'lightbox'}});
            }
        });

        initProject();
    </script>
</body>
</html>
